appId: ai.readycue.desktop
productName: ReadyCue
copyright: Copyright © 2026 ReadyCue

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - assets/**/*
  - "!**/*.ts"
  - "!**/*.map"

protocols:
  - name: ReadyCue
    schemes:
      - readycue

mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  artifactName: "ReadyCue-universal.${ext}"
  target:
    - target: dmg
      arch:
        - universal
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: "ReadyCue needs microphone access to capture your voice during live interview sessions."
    NSScreenCaptureUsageDescription: "ReadyCue needs screen recording permission to capture system audio during live interview sessions so it can transcribe what others are saying."

dmg:
  sign: false
  background: assets/dmg-background.png
  iconSize: 80
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

afterSign: scripts/notarize.js

publish:
  provider: github
  owner: nat1nat1
  repo: readycue-desktop
