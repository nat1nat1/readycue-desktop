<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadyCue — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0b1a;
      color: #eceef4;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-app-region: drag;
    }
    .container {
      text-align: center;
      max-width: 400px;
      padding: 40px 24px;
      -webkit-app-region: no-drag;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    h1 span { color: #6c5ce7; }
    p { font-size: 16px; line-height: 1.6; color: #9ea2b8; margin-bottom: 24px; }
    button {
      background: #6c5ce7;
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ready<span>Cue</span></h1>
    <p>Can't connect to ReadyCue right now. Check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
